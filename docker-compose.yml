version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=change-me-in-production
      - DATABASE_URL=file:/data/play4fun.db
    volumes:
      - ./data:/data        # SQLite 数据持久化
    restart: unless-stopped

