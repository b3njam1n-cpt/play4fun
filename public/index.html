<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play4Fun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
  <!-- Google Fonts: DM Sans + Noto Sans SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="overflow-hidden">

  <!-- ============================================================ -->
  <!-- 全屏背景                                                      -->
  <!-- ============================================================ -->
  <div class="fixed inset-0 z-0">
    <img
      src="https://images.unsplash.com/photo-1550859492-d5da9d8e45f3?w=1920&h=1080&fit=crop&auto=format"
      alt="background"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-black/20"></div>
  </div>

  <!-- ============================================================ -->
  <!-- Hero 区域："Let's Play" 手绘字 + 笑脸                           -->
  <!-- 手机: 全屏居中 | 桌面: 左侧对齐，避让右侧登录面板              -->
  <!-- ============================================================ -->
  <div class="fixed inset-0 z-10 flex items-center justify-center pointer-events-none
              md:justify-start md:pr-[40vw] lg:pr-[380px]">
    <div class="flex flex-col items-center px-6 md:pl-8">
      <img
        src="/lets-play.png"
        alt="Let's Play"
        class="w-full max-w-[280px] sm:max-w-[360px] md:max-w-[640px]"
        style="filter: drop-shadow(0 0 24px rgba(0,0,0,0.4));"
      />
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 顶部导航                                                      -->
  <!-- ============================================================ -->
  <header class="relative z-40 w-full flex items-center justify-between px-4 md:px-6 pt-4 md:pt-5 gap-3 md:gap-4">

    <!-- 左侧 Logo -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <svg class="w-5 h-5 text-violet-300" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      <span class="text-white font-semibold text-sm tracking-wide">Play4Fun</span>
    </div>

    <!-- 中间搜索栏 (Dynamic Island) — 手机端隐藏，桌面端显示 -->
    <div class="hidden md:flex flex-1 justify-center">
      <div id="search-wrapper" class="search-wrapper transition-all">
        <div id="search-bar" class="flex items-center gap-2 px-4 rounded-full search-bar">
          <svg class="w-4 h-4 text-white/45 flex-shrink-0 search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="搜索任何内容…"
            class="flex-1 bg-transparent text-white text-sm outline-none placeholder:text-white/30 min-w-0"
          />
          <button id="search-clear" class="text-white/35 hover:text-white/70 transition-colors hidden">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 右侧语言切换 -->
    <div class="flex justify-end flex-shrink-0">
      <div id="lang-toggle" class="flex items-center gap-1 p-1 rounded-full lang-toggle">
        <svg class="w-3.5 h-3.5 text-white/35 mx-1.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <button id="btn-zh" class="lang-btn active px-3 py-1 rounded-full text-xs font-semibold transition-all">中文</button>
        <button id="btn-en" class="lang-btn px-3 py-1 rounded-full text-xs font-semibold transition-all">EN</button>
      </div>
    </div>
  </header>

  <!-- 手机端搜索栏 (Dynamic Island) — 头部下方全宽 -->
  <div class="relative z-40 flex md:hidden justify-center px-4 pt-3">
    <div id="search-wrapper-mobile" class="w-full max-w-[400px]">
      <div id="search-bar-mobile" class="flex items-center gap-2 px-4 rounded-full search-bar-mobile">
        <svg class="w-4 h-4 text-white/45 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input-mobile"
          type="text"
          placeholder="搜索任何内容…"
          class="flex-1 bg-transparent text-white text-sm outline-none placeholder:text-white/30 min-w-0"
        />
        <button id="search-clear-mobile" class="text-white/35 hover:text-white/70 transition-colors hidden">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 登录面板 — 三档自适应                                          -->
  <!-- 手机: 底部全宽毛玻璃卡片                                      -->
  <!-- 平板: 右侧 40vw 面板                                          -->
  <!-- 桌面: 右侧固定 380px 面板                                     -->
  <!-- ============================================================ -->
  <div id="login-panel" class="fixed right-0 z-30 flex flex-col justify-end
              bottom-0 w-full h-auto
              md:top-0 md:h-full md:w-[40vw] lg:w-[380px] md:justify-center">
    <!-- 桌面端渐变遮罩 -->
    <div class="absolute inset-0 pointer-events-none hidden md:block"
         style="background:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.15) 50%,rgba(0,0,0,0.3) 100%)"></div>

    <div class="relative px-6 py-6 md:px-8 md:py-10 flex flex-col gap-4 md:gap-5
                bg-black/50 backdrop-blur-xl rounded-t-3xl border-t border-white/10
                md:bg-transparent md:backdrop-blur-none md:rounded-none md:border-0">

      <!-- ── 未登录：表单 ── -->
      <div id="panel-login-form" class="w-full max-w-[320px] mx-auto md:mx-0">
        <p id="panel-label" class="text-white/30 text-[11px] font-medium tracking-[0.15em] uppercase mb-5">登录</p>

        <input
          id="login-username"
          type="text"
          placeholder="邮箱"
          class="w-full rounded-xl px-4 py-3 md:py-2.5 text-sm md:text-base text-white placeholder:text-white/30 outline-none transition-all bg-white/5 border border-white/10 focus:border-violet-400/50 focus:bg-white/10 mb-3"
        />
        <input
          id="login-password"
          type="password"
          placeholder="密码"
          class="w-full rounded-xl px-4 py-3 md:py-2.5 text-sm md:text-base text-white placeholder:text-white/30 outline-none transition-all bg-white/5 border border-white/10 focus:border-violet-400/50 focus:bg-white/10 mb-5"
        />

        <button id="btn-login" class="w-full py-3 md:py-2.5 rounded-full text-sm font-bold text-black bg-white hover:bg-white/90 active:scale-[0.97] transition-all">
          登录
        </button>

        <p id="login-error" class="text-red-300 text-xs mt-2 text-center hidden"></p>

        <div class="flex items-center gap-2 mt-3">
          <button id="btn-forgot" class="flex-1 py-2 rounded-full text-xs font-semibold text-white/60 hover:text-white/90 transition-all ghost-btn">
            忘记密码？
          </button>
          <button id="btn-register-toggle" class="flex-1 py-2 rounded-full text-xs font-semibold text-white/60 hover:text-white/90 transition-all ghost-btn">
            注册
          </button>
        </div>
      </div>

      <!-- ── 注册表单（默认隐藏） ── -->
      <div id="panel-register-form" class="hidden w-full max-w-[320px] mx-auto md:mx-0">
        <p class="text-white/30 text-[11px] font-medium tracking-[0.15em] uppercase mb-5">注册</p>

        <input
          id="register-username"
          type="text"
          placeholder="用户名"
          class="w-full rounded-xl px-4 py-3 md:py-2.5 text-sm md:text-base text-white placeholder:text-white/30 outline-none transition-all bg-white/5 border border-white/10 focus:border-violet-400/50 focus:bg-white/10 mb-3"
        />
        <input
          id="register-email"
          type="email"
          placeholder="邮箱"
          class="w-full rounded-xl px-4 py-3 md:py-2.5 text-sm md:text-base text-white placeholder:text-white/30 outline-none transition-all bg-white/5 border border-white/10 focus:border-violet-400/50 focus:bg-white/10 mb-3"
        />
        <input
          id="register-password"
          type="password"
          placeholder="密码（至少 8 位）"
          class="w-full rounded-xl px-4 py-3 md:py-2.5 text-sm md:text-base text-white placeholder:text-white/30 outline-none transition-all bg-white/5 border border-white/10 focus:border-violet-400/50 focus:bg-white/10 mb-5"
        />

        <button id="btn-register-submit" class="w-full py-3 md:py-2.5 rounded-full text-sm font-bold text-black bg-white hover:bg-white/90 active:scale-[0.97] transition-all">
          创建账户
        </button>

        <p id="register-error" class="text-red-300 text-xs mt-2 text-center hidden"></p>

        <div class="flex items-center justify-center mt-3">
          <button id="btn-login-toggle" class="flex-1 py-2 rounded-full text-xs font-semibold text-white/60 hover:text-white/90 transition-all ghost-btn">
            ← 返回登录
          </button>
        </div>
      </div>

      <!-- ── 已登录：用户状态 ── -->
      <div id="panel-logged-in" class="hidden w-full max-w-[320px] mx-auto md:mx-0">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
               style="background:linear-gradient(135deg,#c084fc,#818cf8)">
            <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div>
            <p id="display-username" class="text-white font-semibold text-sm leading-tight">用户名</p>
            <p id="display-email" class="text-white/40 text-xs mt-0.5">@email</p>
          </div>
        </div>

        <button class="flex items-center gap-2.5 text-white/60 hover:text-white transition-colors w-full mb-3">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
          <span class="text-sm" id="notif-text">3 条新通知</span>
          <span class="ml-auto w-5 h-5 rounded-full bg-violet-500 text-white text-[10px] font-bold flex items-center justify-center">3</span>
        </button>

        <button id="btn-logout" class="text-left text-white/35 hover:text-red-400 text-sm transition-colors">
          退出登录
        </button>
      </div>
    </div>
  </div>

  <script src="/app.js?v=3"></script>
</body>
</html>
