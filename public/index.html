<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>play4fun — 个人主页</title>
  <!-- Tailwind CSS CDN（后续可改用构建版本） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- ============================================================ -->
  <!-- 未登录：登录/注册表单                                         -->
  <!-- ============================================================ -->
  <div id="auth-view" class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800">

      <!-- Tab 切换 -->
      <div class="flex mb-6 border-b border-gray-800">
        <button id="tab-login-btn"
                class="flex-1 pb-3 text-center border-b-2 border-blue-500 text-blue-400 font-semibold transition"
                onclick="switchTab('login')">
          登录
        </button>
        <button id="tab-register-btn"
                class="flex-1 pb-3 text-center border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition"
                onclick="switchTab('register')">
          注册
        </button>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
        <div>
          <label class="block text-sm text-gray-400 mb-1">邮箱</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">密码</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                 placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition">
          登录
        </button>
        <p id="login-error" class="text-red-400 text-sm hidden"></p>
      </form>

      <!-- 注册表单 -->
      <form id="register-form" class="space-y-4 hidden" onsubmit="handleRegister(event)">
        <div>
          <label class="block text-sm text-gray-400 mb-1">邮箱</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">密码</label>
          <input type="password" name="password" required minlength="8"
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                 placeholder="至少 8 位">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-semibold transition">
          创建账户
        </button>
        <p id="register-error" class="text-red-400 text-sm hidden"></p>
      </form>

      <!-- 未来 Google 登录入口 -->
      <div class="mt-6 pt-4 border-t border-gray-800">
        <p class="text-center text-xs text-gray-600 mb-3">—— 未来将支持 ——</p>
        <button disabled
                class="w-full py-2.5 bg-gray-800 text-gray-600 rounded-lg font-semibold cursor-not-allowed">
          Google 登录（开发中）
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 已登录：个人主页                                              -->
  <!-- ============================================================ -->
  <div id="home-view" class="hidden">
    <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-blue-400">play4fun</h1>
      <div class="flex items-center gap-4">
        <span id="user-email" class="text-gray-400 text-sm"></span>
        <button onclick="handleLogout()"
                class="px-4 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition">
          登出
        </button>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
      <div class="text-center mb-12">
        <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">
          P4F
        </div>
        <h2 class="text-3xl font-bold mb-2">欢迎来到 play4fun 🎉</h2>
        <p class="text-gray-400">这是你的个人主页。更多功能正在开发中。</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 hover:border-gray-700 transition">
          <h3 class="text-lg font-semibold mb-2">🔐 SSO 认证</h3>
          <p class="text-gray-400 text-sm">邮箱注册/登录已就绪，Google OAuth 即将支持。</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 hover:border-gray-700 transition">
          <h3 class="text-lg font-semibold mb-2">🌍 Cloudflare</h3>
          <p class="text-gray-400 text-sm">全球边缘网络部署，毫秒级响应。</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 hover:border-gray-700 transition">
          <h3 class="text-lg font-semibold mb-2">🚀 持续扩展</h3>
          <p class="text-gray-400 text-sm">Oracle Cloud 兼容，功能按路线图迭代。</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
