# play4fun - Cloudflare Workers 配置
name = "play4fun"
main = "src/index.ts"
compatibility_date = "2025-07-05"

# Smart Placement 已关闭 — 它会将 Worker 路由到香港 DC，
# 导致 Gemini API 报 "User location is not supported"。
# 现在通过 Cloudflare AI Gateway 解决地区限制问题。
# [placement]
# mode = "smart"

# 本地开发服务端口
[dev]
port = 8787

# 静态资源（自动服务，无需 Worker 处理）
[assets]
directory = "./public"

# 自定义域名路由
workers_dev = false
[[routes]]
pattern = "vieplay4fun.win/*"
zone_name = "vieplay4fun.win"

[[routes]]
pattern = "*.vieplay4fun.win/*"
zone_name = "vieplay4fun.win"

# ── 非敏感环境变量（明文，可在 Cloudflare Dashboard 查看）────
[vars]
ENVIRONMENT = "development"
CF_ACCOUNT_ID = "78c067c14d18fbce21192ccb491529b5"  # Cloudflare 账户 ID，AI Gateway 需要
CF_AI_GATEWAY_ID = "play4fun-gemini"  # AI Gateway 名称（在 AI Gateway Dashboard 创建）

# ── 敏感环境变量管理方式 ─────────────────────────
# 本地开发: 创建 .env 文件（cp .env.example .env），wrangler dev 自动读取
# 生产环境: wrangler secret put JWT_SECRET   → 加密存储在 Cloudflare
#            wrangler secret put GOOGLE_CLIENT_SECRET
# CI/CD:    GitHub Secrets → wrangler deploy 时注入

# Workers AI（免费，Llama 模型）
[ai]
binding = "AI"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "play4fun-db"
database_id = "7059f459-8f84-4ab1-8d8a-789bd6a6b218"

# TODO: 创建 KV 命名空间后取消注释
# [[kv_namespaces]]
# binding = "KV"
# id = ""
